<div class="page-shell">
    <div class="page-container-xl">

        <div class="analytics__header">
            <h1 class="page-title">Analytics</h1>
            <p class="page-subtitle">Deep dive into your trading performance</p>
        </div>

        <app-filter-toolbar></app-filter-toolbar>

        <!-- Advanced Stats Bar -->
        <div class="analytics__stats-bar">
            <app-advanced-stats-bar [trades]="filteredTrades()"></app-advanced-stats-bar>
        </div>

        <!-- Row 1: Equity Curve + Long vs Short -->
        <div class="analytics__row analytics__row--6040">
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Equity Curve</h3>
                <div class="analytics__chart-tall">
                    <app-equity-curve-chart
                        [equityData]="equityCurveData()"
                        [baseline]="equityBaseline()">
                    </app-equity-curve-chart>
                </div>
            </div>
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Long vs Short</h3>
                <app-long-short-breakdown [trades]="filteredTrades()"></app-long-short-breakdown>
            </div>
        </div>

        <!-- Row 2: Symbol + Weekday -->
        <div class="analytics__row analytics__row--5050">
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Performance by Symbol</h3>
                <app-performance-by-symbol [trades]="filteredTrades()"></app-performance-by-symbol>
            </div>
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Performance by Day of Week</h3>
                <app-performance-by-weekday [trades]="filteredTrades()"></app-performance-by-weekday>
            </div>
        </div>

        <!-- Row 3: Hourly + Setup -->
        <div class="analytics__row analytics__row--5050">
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Performance by Hour</h3>
                <app-hourly-performance [trades]="filteredTrades()"></app-hourly-performance>
            </div>
            <div class="card analytics__card">
                <h3 class="analytics__card-title">Performance by Setup</h3>
                <app-performance-by-setup [trades]="filteredTrades()"></app-performance-by-setup>
            </div>
        </div>

    </div>
</div>
