<div class="beta-lock">
    <div class="beta-lock__glow" aria-hidden="true"></div>

    <div class="beta-lock__card">
        <img class="beta-lock__logo" src="NVZN_Trading_logo_transparent_noshine.png" alt="NVZN Journal" />

        <span class="beta-lock__badge">Closed beta</span>

        <h1 class="beta-lock__title">NVZN Journal is in closed beta</h1>

        <p class="beta-lock__copy">
            Unlock the journal by subscribing directly, or join NVZN Trading —
            membership grants your access automatically.
        </p>

        <!-- Subscribe directly (Stripe) -->
        <div class="beta-lock__subscribe">
            <button class="beta-lock__sub-btn"
                    type="button"
                    [disabled]="checkoutLoading() !== null"
                    (click)="subscribe('monthly')">
                {{ checkoutLoading() === 'monthly' ? 'Starting…' : 'Subscribe monthly' }}
            </button>
            <button class="beta-lock__sub-btn beta-lock__sub-btn--ghost"
                    type="button"
                    [disabled]="checkoutLoading() !== null"
                    (click)="subscribe('annual')">
                {{ checkoutLoading() === 'annual' ? 'Starting…' : 'Subscribe yearly' }}
            </button>
        </div>

        @if (checkoutError()) {
            <p class="beta-lock__error">{{ checkoutError() }}</p>
        }

        <div class="beta-lock__divider"><span>or</span></div>

        <a class="beta-lock__discord" [href]="whopJoinUrl" target="_blank" rel="noopener">
            Join NVZN Trading
        </a>

        <button class="beta-lock__logout" type="button" (click)="logout()">
            Log out
        </button>
    </div>
</div>
