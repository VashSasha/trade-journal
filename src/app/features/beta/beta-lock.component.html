<div class="beta-lock">
    <div class="beta-lock__glow" aria-hidden="true"></div>

    <div class="beta-lock__card">
        <img class="beta-lock__logo" src="NVZN_Trading_logo_transparent_noshine.png" alt="NVZN Journal" />

        <span class="beta-lock__badge">Closed beta</span>

        <h1 class="beta-lock__title">NVZN Journal is in closed beta</h1>

        <p class="beta-lock__copy">
            Access is currently limited to beta testers. You get in once you have the
            <strong>Beta Tester</strong> role in the NVZN Trading Discord — join the
            server and grab the role, then log back in.
        </p>

        <a class="beta-lock__discord" [href]="discordInviteUrl" target="_blank" rel="noopener">
            Join the NVZN Trading Discord
        </a>

        <button class="beta-lock__logout" type="button" (click)="logout()">
            Log out
        </button>
    </div>
</div>
