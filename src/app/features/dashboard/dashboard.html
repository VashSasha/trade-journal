<div class="min-h-full bg-slate-50 p-6 dark:bg-slate-950">
    <div class="mx-auto max-w-7xl">
        <!-- Header -->
        <div class="mb-6 flex flex-col justify-between gap-4 sm:flex-row sm:items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Dashboard</h1>
                <p class="mt-1 text-slate-600 dark:text-slate-400">Your trading performance at a glance</p>
            </div>

            <!-- Account Balance Widget -->
            <div
                class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white p-3 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                <div class="flex flex-col px-1">
                    <span class="text-xs font-medium text-slate-500 uppercase tracking-wide">Account Balance</span>
                    <span class="text-xl font-bold text-slate-900 dark:text-white font-mono">
                        @if (accountBalance() === null) {
                        <span class="text-slate-300">---</span>
                        } @else {
                        {{ accountBalance() | currency }}
                        }
                    </span>
                </div>
                <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button (click)="syncBalance()" [disabled]="isBalancing()"
                    class="rounded-lg p-2 text-slate-400 hover:bg-slate-50 hover:text-emerald-600 dark:hover:bg-slate-800 dark:hover:text-emerald-400 transition-colors"
                    title="Sync Balance">
                    <svg [class.animate-spin]="isBalancing()" class="h-5 w-5" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Stats Overview -->
        <app-stats-overview [stats]="stats()"></app-stats-overview>

        <!-- Charts Row -->
        <app-performance-charts [equityData]="equityCurveData()" [winLossStats]="stats()">
        </app-performance-charts>

        <!-- Calendar & Recent Trades Grid -->
        <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">

            <!-- Goals Widget -->
            <div class="lg:col-span-3">
                <app-goals-widget></app-goals-widget>
            </div>

            <!-- Calendar Section (Takes up 2 cols on large screens) -->
            <app-calendar-heatmap class="lg:col-span-2" [trades]="trades()"></app-calendar-heatmap>

            <!-- Recent Trades (Takes up 1 col on large screens) -->
            <app-recent-trades [trades]="recentTrades()"></app-recent-trades>
        </div>
    </div>
</div>
