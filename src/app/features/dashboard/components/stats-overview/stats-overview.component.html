<div class="stats-overview">
  <!-- Total P&L -->
  <div class="stat-card" [class.stat-card--positive]="stats.totalPnl > 0" [class.stat-card--negative]="stats.totalPnl < 0">
    <div class="stat-card__body">
      <div class="stat-card__label">Total P&L</div>
      <div class="stat-card__value">{{ stats.totalPnl | currency }}</div>
      <div class="stat-card__sub">
        {{ stats.totalPoints >= 0 ? '+' : '' }}{{ stats.totalPoints.toFixed(2) }} points
      </div>
    </div>
    <div class="stat-card__icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
  </div>

  <!-- Win Rate -->
  <div class="stat-card stat-card--blue">
    <div class="stat-card__body">
      <div class="stat-card__label">Win Rate</div>
      <div class="stat-card__value">{{ stats.winRate.toFixed(1) }}%</div>
    </div>
    <div class="stat-card__icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
    </div>
  </div>

  <!-- Total Trades -->
  <div class="stat-card stat-card--purple">
    <div class="stat-card__body">
      <div class="stat-card__label">Total Trades</div>
      <div class="stat-card__value">{{ stats.totalTrades }}</div>
      <div class="stat-card__sub">{{ stats.openTrades }} open</div>
    </div>
    <div class="stat-card__icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
  </div>

  <!-- Best Trade -->
  <div class="stat-card stat-card--positive">
    <div class="stat-card__body">
      <div class="stat-card__label">Best Trade</div>
      <div class="stat-card__value">{{ stats.largestWin | currency }}</div>
    </div>
    <div class="stat-card__icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
      </svg>
    </div>
  </div>
</div>
