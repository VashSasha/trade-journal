<div class="mb-6 grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
  <!-- Total P&L -->
  <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-sm font-medium text-slate-600 dark:text-slate-400">Total P&L</div>
        <div class="mt-2 text-3xl font-bold" [class.text-emerald-600]="stats.totalPnl > 0"
             [class.dark:text-emerald-400]="stats.totalPnl > 0" [class.text-red-600]="stats.totalPnl < 0"
             [class.dark:text-red-400]="stats.totalPnl < 0" [class.text-slate-900]="stats.totalPnl === 0"
             [class.dark:text-white]="stats.totalPnl === 0">
          {{ stats.totalPnl | currency }}
        </div>
        <div class="mt-1 text-sm text-slate-500 dark:text-slate-400">
          {{ stats.totalPoints >= 0 ? '+' : '' }}{{ stats.totalPoints.toFixed(2) }} points
        </div>
      </div>
      <div class="rounded-full p-3" [class.bg-emerald-100]="stats.totalPnl > 0"
           [class.dark:bg-emerald-900]="stats.totalPnl > 0" [class.bg-red-100]="stats.totalPnl < 0"
           [class.dark:bg-red-900]="stats.totalPnl < 0" [class.bg-slate-100]="stats.totalPnl === 0"
           [class.dark:bg-slate-800]="stats.totalPnl === 0">
        <svg class="h-6 w-6" [class.text-emerald-600]="stats.totalPnl > 0"
             [class.dark:text-emerald-400]="stats.totalPnl > 0" [class.text-red-600]="stats.totalPnl < 0"
             [class.dark:text-red-400]="stats.totalPnl < 0" [class.text-slate-600]="stats.totalPnl === 0"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Win Rate -->
  <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-sm font-medium text-slate-600 dark:text-slate-400">Win Rate</div>
        <div class="mt-2 text-3xl font-bold text-slate-900 dark:text-white">
          {{ stats.winRate.toFixed(1) }}%
        </div>
      </div>
      <div class="rounded-full bg-blue-100 p-3 dark:bg-blue-900/30">
        <svg class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Total Trades -->
  <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-sm font-medium text-slate-600 dark:text-slate-400">Total Trades</div>
        <div class="mt-2 text-3xl font-bold text-slate-900 dark:text-white">
          {{ stats.totalTrades }}
        </div>
        <div class="mt-1 text-xs text-slate-500">
          {{ stats.openTrades }} open
        </div>
      </div>
      <div class="rounded-full bg-purple-100 p-3 dark:bg-purple-900/30">
        <svg class="h-6 w-6 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Best Trade -->
  <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-sm font-medium text-slate-600 dark:text-slate-400">Best Trade</div>
        <div class="mt-2 text-3xl font-bold text-emerald-600 dark:text-emerald-400">
          {{ stats.largestWin | currency }}
        </div>
      </div>
      <div class="rounded-full bg-emerald-100 p-3 dark:bg-emerald-900/30">
        <svg class="h-6 w-6 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor"
             viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
        </svg>
      </div>
    </div>
  </div>
</div>
