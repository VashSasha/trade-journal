<div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
    <div class="mb-4 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-slate-900 dark:text-white">Goals</h3>
        <button (click)="toggleAdd()"
            class="rounded-full !p-1 text-slate-400 hover:bg-slate-100 hover:text-emerald-600 dark:hover:bg-slate-800 dark:hover:text-emerald-400">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </button>
    </div>

    @if (isAdding()) {
    <form [formGroup]="goalForm" (ngSubmit)="onSubmit()" class="mb-6 rounded-lg bg-slate-50 p-4 dark:bg-slate-800/50">
        <div class="space-y-3">
            <div>
                <label class="block text-xs font-medium text-slate-700 dark:text-slate-300">Goal Type</label>
                <select formControlName="type"
                    class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm dark:border-slate-700 dark:bg-slate-800 dark:text-white">
                    <option value="monthly_pnl">Monthly P&L</option>
                    <option value="monthly_trades">Monthly Trades</option>
                    <option value="win_rate">Win Rate</option>
                    <option value="yearly_pnl">Yearly P&L</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-700 dark:text-slate-300">Target Value</label>
                <input type="number" formControlName="target"
                    class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm dark:border-slate-700 dark:bg-slate-800 dark:text-white" />
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <button type="button" (click)="toggleAdd()" class="text-xs text-slate-500 hover:text-slate-700">
                    Cancel
                </button>
                <button type="submit" [disabled]="goalForm.invalid"
                    class="rounded bg-emerald-500 px-3 py-1.5 text-xs font-medium text-white hover:bg-emerald-600 disabled:opacity-50">
                    Add Goal
                </button>
            </div>
        </div>
    </form>
    }

    @if (goals().length === 0 && !isAdding()) {
    <div class="py-8 text-center text-sm text-slate-500 dark:text-slate-400">
        No active goals. <br />
        <button (click)="toggleAdd()" class="mt-2 font-medium text-emerald-600 hover:underline">Set a target</button>
    </div>
    } @else {
    <div class="space-y-5">
        @for (goal of goals(); track goal.id) {
        <div class="relative group">
            <button (click)="deleteGoal(goal.id)"
                class="absolute -right-2 -top-2 hidden rounded-full bg-slate-100 p-1 text-slate-400 hover:bg-red-100 hover:text-red-500 group-hover:block dark:bg-slate-800 dark:hover:bg-red-900/30">
                <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="flex items-end justify-between text-sm">
                <span class="font-medium text-slate-700 dark:text-slate-300">{{ goal.label }}</span>
                <span class="text-xs text-slate-500">
                    {{ formatValue(goal.current, goal.type) }} / {{ formatValue(goal.target, goal.type) }}
                </span>
            </div>
            <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-slate-100 dark:bg-slate-800">
                <div class="h-full rounded-full transition-all duration-500" [style.width.%]="calculateProgress(goal)"
                    [class.bg-emerald-500]="goal.current >= goal.target"
                    [class.bg-blue-500]="goal.current < goal.target && goal.current > 0"
                    [class.bg-slate-300]="goal.current <= 0">
                </div>
            </div>
        </div>
        }
    </div>
    }
</div>
