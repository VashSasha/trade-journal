<div class="goals-widget">
    <div class="goals-widget__header">
        <h3 class="goals-widget__title">Goals</h3>
        <button class="goals-widget__add-btn" (click)="toggleAdd()" type="button">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </button>
    </div>

    @if (isAdding()) {
    <form class="goal-add-form" [formGroup]="goalForm" (ngSubmit)="onSubmit()">
        <div class="goal-add-form__fields">
            <div>
                <label class="goal-add-form__label">Goal Type</label>
                <select class="goal-add-form__select" formControlName="type">
                    <option value="monthly_pnl">Monthly P&L</option>
                    <option value="monthly_trades">Monthly Trades</option>
                    <option value="win_rate">Win Rate</option>
                    <option value="yearly_pnl">Yearly P&L</option>
                </select>
            </div>
            <div>
                <label class="goal-add-form__label">Target Value</label>
                <input class="goal-add-form__input" type="number" formControlName="target" />
            </div>
            <div class="goal-add-form__actions">
                <button class="goal-add-form__cancel" type="button" (click)="toggleAdd()">Cancel</button>
                <button class="goal-add-form__submit" type="submit" [disabled]="goalForm.invalid">Add Goal</button>
            </div>
        </div>
    </form>
    }

    @if (goals().length === 0 && !isAdding()) {
    <div class="goals-widget__empty">
        No active goals.<br />
        <button class="goals-widget__empty-cta" (click)="toggleAdd()" type="button">Set a target</button>
    </div>
    } @else {
    <div class="goals-widget__list">
        @for (goal of goals(); track goal.id) {
        <div class="goal-item">
            <button class="goal-item__delete" type="button" (click)="deleteGoal(goal.id)">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="goal-item__header">
                <span class="goal-item__label">{{ goal.label }}</span>
                <span class="goal-item__progress-text">
                    {{ formatValue(goal.current, goal.type) }} / {{ formatValue(goal.target, goal.type) }}
                </span>
            </div>
            <div class="goal-item__bar">
                <div class="goal-item__bar-fill"
                    [style.width.%]="calculateProgress(goal)"
                    [class.goal-item__bar-fill--complete]="goal.current >= goal.target"
                    [class.goal-item__bar-fill--in-progress]="goal.current < goal.target && goal.current > 0"
                    [class.goal-item__bar-fill--empty]="goal.current <= 0">
                </div>
            </div>
        </div>
        }
    </div>
    }
</div>
