<div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900 lg:col-span-2">
    <div class="mb-6 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-slate-900 dark:text-white">Performance Calendar</h3>

        <div class="flex items-center gap-2">
            <button (click)="prevMonth()" class="rounded p-1 hover:bg-slate-100 dark:hover:bg-slate-800">
                <svg class="h-5 w-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <span class="min-w-[140px] text-center font-medium text-slate-900 dark:text-white">
                {{ currentMonthYear() }}
            </span>
            <button (click)="nextMonth()" class="rounded p-1 hover:bg-slate-100 dark:hover:bg-slate-800">
                <svg class="h-5 w-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
            <button (click)="today()"
                class="ml-2 text-sm text-emerald-600 hover:text-emerald-700 dark:text-emerald-400">
                Today
            </button>
        </div>
    </div>

    <!-- Days Header -->
    <div class="mb-2 grid grid-cols-7 text-center">
        <div class="text-xs font-medium text-slate-400">Sun</div>
        <div class="text-xs font-medium text-slate-400">Mon</div>
        <div class="text-xs font-medium text-slate-400">Tue</div>
        <div class="text-xs font-medium text-slate-400">Wed</div>
        <div class="text-xs font-medium text-slate-400">Thu</div>
        <div class="text-xs font-medium text-slate-400">Fri</div>
        <div class="text-xs font-medium text-slate-400">Sat</div>
    </div>

    <!-- Calendar Grid -->
    <div class="grid grid-cols-7 gap-px border border-slate-200 bg-slate-200 dark:border-slate-700 dark:bg-slate-700">
        @for (day of calendarData(); track $index) {
        <div class="min-h-[80px] p-2 transition-colors hover:bg-slate-50 dark:hover:bg-slate-800"
            [class.opacity-50]="!day.isCurrentMonth" [class.bg-white]="day.pnl === 0"
            [class.dark:bg-slate-900]="day.pnl === 0" [class.text-white]="day.pnl !== 0"
            [class.bg-emerald-100]="day.pnl > 0" [class.dark:bg-emerald-900/40]="day.pnl > 0"
            [class.bg-red-100]="day.pnl < 0" [class.dark:bg-red-900/40]="day.pnl < 0">
            <div class="flex justify-between items-start">
                <span class="text-xs font-medium" [class.text-slate-900]="day.isCurrentMonth"
                    [class.dark:text-slate-200]="day.isCurrentMonth" [class.text-slate-400]="!day.isCurrentMonth"
                    [class.bg-emerald-100]="day.isToday && day.pnl === 0"
                    [class.text-emerald-700]="day.isToday && day.pnl === 0" [class.px-1.5]="day.isToday"
                    [class.rounded-full]="day.isToday">
                    {{ day.day }}
                </span>
                @if (day.hasTrades) {
                <span class="text-[10px]" [class.text-emerald-700]="day.pnl > 0"
                    [class.dark:text-emerald-400]="day.pnl > 0" [class.text-red-700]="day.pnl < 0"
                    [class.dark:text-red-400]="day.pnl < 0" [class.text-slate-400]="day.pnl === 0">
                    {{ day.count }} trade{{ day.count > 1 ? 's' : '' }}
                </span>
                }
            </div>

            @if (day.hasTrades && day.pnl !== 0) {
            <div class="mt-2 text-right">
                <div class="text-xs font-bold" [class.text-emerald-700]="day.pnl > 0"
                    [class.dark:text-emerald-400]="day.pnl > 0" [class.text-red-700]="day.pnl < 0"
                    [class.dark:text-red-400]="day.pnl < 0">
                    {{ formatCurrency(day.pnl) }}
                </div>
            </div>
            }
        </div>
        }
    </div>
</div>
