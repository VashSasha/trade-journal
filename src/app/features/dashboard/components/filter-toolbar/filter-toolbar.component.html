<div class="filter-toolbar">
    <!-- Label -->
    <div class="filter-toolbar__label">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        Filters:
    </div>

    <!-- Date Range Presets -->
    <div class="filter-toolbar__presets">
        <button class="filter-preset" (click)="setDateFilter('all')"
            [class.filter-preset--active]="activeDateFilter() === 'all'">
            All Time
        </button>
        <button class="filter-preset" (click)="setDateFilter('today')"
            [class.filter-preset--active]="activeDateFilter() === 'today'">
            Today
        </button>
        <button class="filter-preset" (click)="setDateFilter('week')"
            [class.filter-preset--active]="activeDateFilter() === 'week'">
            This Week
        </button>
        <button class="filter-preset" (click)="setDateFilter('month')"
            [class.filter-preset--active]="activeDateFilter() === 'month'">
            This Month
        </button>
        <div class="filter-dropdown">
            <button class="filter-preset" (click)="toggleCustomDatePicker()"
                [class.filter-preset--custom-active]="activeDateFilter() === 'custom'">
                Custom
            </button>
            @if (showCustomDatePicker()) {
                <div class="filter-dropdown__panel filter-dropdown__panel--wide">
                    <div class="filter-dropdown__date-field">
                        <label class="filter-dropdown__date-label">Start Date</label>
                        <input class="filter-dropdown__date-input" type="date" [(ngModel)]="customStartDate" />
                    </div>
                    <div class="filter-dropdown__date-field">
                        <label class="filter-dropdown__date-label">End Date</label>
                        <input class="filter-dropdown__date-input" type="date" [(ngModel)]="customEndDate" />
                    </div>
                    <div class="filter-dropdown__date-actions">
                        <button class="filter-dropdown__apply-btn" (click)="applyCustomDateRange()">Apply</button>
                        <button class="filter-dropdown__cancel-btn" (click)="showCustomDatePicker.set(false)">Cancel</button>
                    </div>
                </div>
            }
        </div>
    </div>

    <div class="filter-toolbar__divider"></div>

    <!-- Side Filters -->
    <div class="filter-toolbar__sides">
        <button class="filter-side-btn" (click)="filterService.toggleSide('long')"
            [class.filter-side-btn--long-active]="filterService.filters().sides.includes('long')">
            Long
        </button>
        <button class="filter-side-btn" (click)="filterService.toggleSide('short')"
            [class.filter-side-btn--short-active]="filterService.filters().sides.includes('short')">
            Short
        </button>
    </div>

    <div class="filter-toolbar__divider"></div>

    <!-- Account Filter -->
    <div class="filter-toolbar__dropdowns">
        <div class="filter-dropdown">
            <button class="filter-accounts-btn" (click)="showAccountFilter.set(!showAccountFilter())"
                [class.filter-accounts-btn--active]="filterService.filters().accountIds.length > 0">
                Accounts
                @if (filterService.filters().accountIds.length > 0) {
                    <span class="filter-accounts-btn__badge">{{ filterService.filters().accountIds.length }}</span>
                }
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            @if (showAccountFilter()) {
                <div class="filter-dropdown__panel filter-dropdown__panel--accounts">
                    <div class="filter-dropdown__accounts-list">
                        @for (account of availableAccounts(); track account.id) {
                            <label class="filter-dropdown__account-item">
                                <input type="checkbox"
                                    [checked]="filterService.filters().accountIds.includes(account.id.toString())"
                                    (change)="filterService.toggleAccount(account.id.toString())" />
                                <span>{{ account.name }}</span>
                            </label>
                        } @empty {
                            <div class="filter-dropdown__account-empty">No accounts available</div>
                        }
                    </div>
                </div>
            }
        </div>
    </div>

    <!-- Reset -->
    <button class="filter-toolbar__reset" (click)="reset()">Reset</button>
</div>
