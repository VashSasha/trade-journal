<div class="mb-6 grid grid-cols-1 gap-6 lg:grid-cols-2">
    <!-- Equity Curve -->
    <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
        <h3 class="mb-4 text-lg font-semibold text-slate-900 dark:text-white">Equity Curve</h3>
        <div class="h-64">
            <app-equity-curve-chart
                [equityData]="equityData"
                [baseline]="equityData.values[0] ?? 0">
            </app-equity-curve-chart>
        </div>
    </div>

    <!-- Win/Loss Distribution -->
    <div class="rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
        <h3 class="mb-4 text-lg font-semibold text-slate-900 dark:text-white">Win/Loss Distribution</h3>
        <div class="h-64">
            <canvas #winLossChart></canvas>
        </div>
    </div>
</div>
