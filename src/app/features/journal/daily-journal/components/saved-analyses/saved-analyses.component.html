@if (analyses().length > 0) {
<div class="sa">

    <div class="sa__header">
        <span class="sa__title">Saved analyses</span>
        <span class="sa__count">{{ analyses().length }}</span>
    </div>

    @if (error()) {
        <p class="sa__error">{{ error() }}</p>
    }

    <div class="sa__list">
        @for (a of analyses(); track a.id) {
            <div class="sa__item" [class.is-expanded]="expandedId() === a.id">

                <div class="sa__item-head">
                    <button class="sa__item-toggle" (click)="toggle(a.id)"
                            [attr.aria-expanded]="expandedId() === a.id">
                        <svg class="sa__chevron" [class.is-open]="expandedId() === a.id"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        <span class="sa__item-time">{{ a.createdAt | date:'MMM d, y • h:mm a' }}</span>
                    </button>

                    <button class="sa__delete" (click)="remove(a.id, $event)"
                            [disabled]="deletingId() === a.id"
                            aria-label="Delete saved analysis">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>

                @if (expandedId() === a.id) {
                    <div class="sa__item-body">
                        <markdown [data]="a.content"></markdown>
                    </div>
                }

            </div>
        }
    </div>

</div>
}
