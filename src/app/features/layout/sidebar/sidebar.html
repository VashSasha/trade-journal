<aside class="flex h-full w-64 flex-col border-r border-slate-800 bg-slate-900 text-white transition-all duration-300">
    <!-- Logo Area -->
    <div class="flex h-16 items-center justify-center border-b border-slate-800">
        <span class="text-xl font-bold tracking-wider text-emerald-500">NVZN JOURNAL</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 space-y-2 px-4 py-6">
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <span>Dashboard</span>
        </a>
        <a routerLink="/journal" routerLinkActive="active" class="nav-link">
            <span>Journal</span>
        </a>
        <a routerLink="/analytics" routerLinkActive="active" class="nav-link">
            <span>Analytics</span>
        </a>
        <a routerLink="/reports" routerLinkActive="active" class="nav-link">
            <span>AI Analyzer</span>
        </a>
        <a routerLink="/settings" routerLinkActive="active" class="nav-link">
            <span>Settings</span>
        </a>
    </nav>

    <!-- Footer/User Profile -->
    @if (authService.currentUser(); as user) {
    <div class="border-t border-slate-800 p-4">
        <div class="flex items-center gap-3">
            <div class="user-avatar">{{ user.initials }}</div>
            <div class="flex flex-1 flex-col">
                <span class="text-sm font-medium text-white">{{ user.name }}</span>
                <span class="text-xs text-slate-400">{{ user.plan }}</span>
            </div>
            <button (click)="logout()" class="btn-icon hover:text-white" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </div>
    </div>
    }
</aside>
