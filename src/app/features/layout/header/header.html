<header class="flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-6 dark:border-slate-800 dark:bg-slate-900">

    <!-- Left Side -->
    <div class="flex items-center gap-4">
        <h1 class="text-lg font-semibold text-slate-800 dark:text-white">Overview</h1>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-3">

        <!-- Theme Toggle -->
        <button (click)="theme.toggle()" class="header-icon-btn" [title]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
            @if (theme.isDark()) {
            <!-- Sun -->
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            } @else {
            <!-- Moon -->
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            }
        </button>

        <!-- New Trade -->
        <a routerLink="/journal/trade/new"
            class="rounded-lg bg-emerald-500 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-emerald-600">
            + New Trade
        </a>

    </div>
</header>
