<div class="min-h-full bg-slate-50 p-6 dark:bg-slate-950">
    <div class="mx-auto max-w-2xl">
        <!-- Header -->
        <div class="mb-8 flex items-center gap-4">
            <button (click)="back()" class="rounded-lg p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
            <div>
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Integration Settings</h1>
                <p class="mt-1 text-slate-600 dark:text-slate-400">Configure your broker connections</p>
            </div>
        </div>

        <!-- Tradovate Card -->
        <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="mb-6 flex items-center gap-4">
                <div
                    class="flex h-12 w-12 items-center justify-center rounded-lg bg-blue-600 text-white font-bold text-xl">
                    T
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Tradovate</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400">Sync your fill history automatically</p>
                </div>
                <div class="ml-auto">
                    <span
                        class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-medium text-slate-800 dark:bg-slate-800 dark:text-slate-300">
                        REST API
                    </span>
                </div>
            </div>

            <form [formGroup]="configForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <!-- API Info Alert -->
                <div class="rounded-lg bg-blue-50 p-4 text-sm text-blue-700 dark:bg-blue-900/30 dark:text-blue-300">
                    <p class="font-medium">Requirements:</p>
                    <ul class="mt-1 list-disc pl-5">
                        <li>Active Tradovate account</li>
                        <li>"API Access" Add-on subscription ($25/mo)</li>
                        <li>Generated API Key (CID) and Secret from Application Settings</li>
                    </ul>
                </div>

                <!-- Fields -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                        API Key (CID)
                    </label>
                    <input type="text" formControlName="apiKey" placeholder="Typically an integer (e.g. 1234)"
                        class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-slate-900 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">
                        API Secret
                    </label>
                    <div class="relative mt-1">
                        <input [type]="showSecret() ? 'text' : 'password'" formControlName="apiSecret"
                            placeholder="Your long secret key..."
                            class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 pr-10 text-slate-900 placeholder-slate-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 dark:border-slate-700 dark:bg-slate-800 dark:text-white" />
                        <button type="button" (click)="toggleSecret()"
                            class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                            @if (showSecret()) {
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                            } @else {
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            }
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-end gap-3 pt-4">
                    <button type="button" (click)="back()"
                        class="px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white">
                        Cancel
                    </button>
                    <button type="submit" [disabled]="configForm.invalid"
                        class="rounded-lg bg-blue-600 px-6 py-2.5 font-medium text-white shadow-sm transition-all hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50">
                        {{ isSaved() ? 'Saved!' : 'Save Credentials' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
