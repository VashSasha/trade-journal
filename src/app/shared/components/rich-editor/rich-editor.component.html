<div class="re-wrap">

  <quill-editor
    [class]="quillClass"
    [ngModel]="value"
    (ngModelChange)="valueChange.emit($event)"
    [modules]="modules"
    [placeholder]="placeholder"
    [styles]="styles"
    (onEditorCreated)="onEditorCreated($event)"
  ></quill-editor>

  @if (toolbarVisible()) {
    <div class="re-toolbar"
         [style.top.px]="toolbarTop()"
         [style.left.px]="toolbarLeft()"
         (mousedown)="$event.preventDefault()">

      <!-- Bold -->
      <button class="re-btn" [class.is-active]="fmt()['bold']" (click)="format('bold')" title="Bold">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
      </button>

      <!-- Italic -->
      <button class="re-btn" [class.is-active]="fmt()['italic']" (click)="format('italic')" title="Italic">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.49 3l-.63 2h2.88l-3.46 14H7.51l-.63 2H17l.63-2h-2.88l3.46-14h2.77l.63-2H11.49z"/></svg>
      </button>

      <!-- Underline -->
      <button class="re-btn" [class.is-active]="fmt()['underline']" (click)="format('underline')" title="Underline">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17a6 6 0 0 0 6-6V3h-2v8a4 4 0 0 1-8 0V3H6v8a6 6 0 0 0 6 6zM4 19h16v2H4z"/></svg>
      </button>

      <!-- Strike -->
      <button class="re-btn" [class.is-active]="fmt()['strike']" (click)="format('strike')" title="Strikethrough">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 10A5.98 5.98 0 0 0 12 6a6 6 0 0 0-6 6 6 6 0 0 0 6 6 5.98 5.98 0 0 0 5.65-4H12v-2h9v2h-2.35zM4 11h16v2H4z"/></svg>
      </button>

      <span class="re-sep"></span>

      <!-- Headings -->
      <button class="re-btn re-btn--label" [class.is-active]="fmt()['header'] === 1" (click)="formatHeader(1)" title="Heading 1">H1</button>
      <button class="re-btn re-btn--label" [class.is-active]="fmt()['header'] === 2" (click)="formatHeader(2)" title="Heading 2">H2</button>


      <span class="re-sep"></span>

      <!-- Highlight with color picker -->
      <div class="re-highlight-wrap">
        <button class="re-btn re-btn--highlight"
                [class.is-active]="!!fmt()['background']"
                [style.--hl-color]="fmt()['background'] || '#fef08a'"
                (click)="toggleColorPicker($event)"
                title="Highlight color">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 3H4v13l5 5 5-5V3h-5z" stroke-linejoin="round"/>
            <line x1="9" y1="3" x2="15" y2="3"/>
            <line x1="4" y1="9" x2="15" y2="9"/>
          </svg>
          <span class="re-hl-swatch" [style.background]="fmt()['background'] || '#fef08a'"></span>
        </button>

        @if (colorPickerOpen()) {
          <div class="re-color-picker" (mousedown)="$event.preventDefault()">
            @for (c of highlightColors; track c.bg) {
              <button class="re-color-swatch"
                      [class.is-active]="fmt()['background'] === c.bg"
                      [style.background]="c.bg"
                      [title]="c.label"
                      (click)="applyHighlight(c.bg, $event)">
              </button>
            }
          </div>
        }
      </div>

      <!-- Text color with color picker -->
      <div class="re-highlight-wrap">
        <button class="re-btn re-btn--highlight"
                [class.is-active]="!!fmt()['color'] && fmt()['color'] !== '#1e293b'"
                (click)="toggleTextColorPicker($event)"
                title="Text color">
          <span class="re-tc-letter">A</span>
          <span class="re-hl-swatch"
                [style.background]="fmt()['color'] && fmt()['color'] !== '#1e293b' ? fmt()['color'] : '#94a3b8'"></span>
        </button>

        @if (textColorPickerOpen()) {
          <div class="re-color-picker" (mousedown)="$event.preventDefault()">
            @for (c of textColors; track c.color) {
              <button class="re-color-swatch"
                      [class.is-active]="fmt()['color'] === c.color"
                      [style.background]="c.color"
                      [title]="c.label"
                      (click)="applyTextColor(c.color, $event)">
              </button>
            }
            <button class="re-color-swatch re-color-swatch--remove"
                    [class.is-active]="!fmt()['color'] || fmt()['color'] === '#1e293b'"
                    title="Default color"
                    (click)="applyTextColor(null, $event)">
            </button>
          </div>
        }
      </div>

      <span class="re-sep"></span>

      <!-- Link -->
      <button class="re-btn" [class.is-active]="!!fmt()['link']" (click)="formatLink()" title="Link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </button>

      <!-- Clear formatting -->
      <button class="re-btn" (click)="clearFormat()" title="Clear formatting">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19h4v-4.83l-4.83-4.83L3.5 10.9V19H6zm13.41-13L18 4.59 16.17 6.41 14.41 4.66l-1.42 1.41 1.75 1.75-3.41 3.41-1.75-1.75-1.41 1.42 1.75 1.75L6.41 16.5l1.42 1.41L10 15.83V19h7.83L19 17.83V17l.41-.41L21 15l-1.42-1.41L21 12l-1.59-1.59zM18 9.17l1.41 1.41L18 12l-1.41-1.41zM10.83 19H10v-.83l.83-.83.83.83z"/>
        </svg>
      </button>

    </div>
  }

</div>
