<header class="public-nav">
    <div class="public-nav__inner">
        <a class="public-nav__brand" routerLink="/">
            <img class="public-nav__logo" src="NVZN_Trading_logo_transparent_noshine.png" alt="NVZN Journal" />
        </a>
        <nav class="public-nav__links">
            @if (onLanding()) {
                <a class="public-nav__link" href="#features">Features</a>
                <a class="public-nav__link" href="#pricing">Pricing</a>
            } @else {
                <a class="public-nav__link" routerLink="/" fragment="features">Features</a>
                <a class="public-nav__link" routerLink="/" fragment="pricing">Pricing</a>
            }
            <button class="public-nav__theme" (click)="theme.toggle()"
                [title]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
                @if (theme.isDark()) {
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                } @else {
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                }
            </button>
            @if (onLanding()) {
                <a class="public-nav__login" routerLink="/login">Log in</a>
                <a class="public-nav__cta" href="#pricing">Get started</a>
            } @else {
                <a class="public-nav__cta" routerLink="/" fragment="pricing">Get started</a>
            }
        </nav>
    </div>
</header>
