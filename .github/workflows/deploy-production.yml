name: "Deploy: Production"

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  validate-branch:
    name: Validate branch
    runs-on: ubuntu-latest
    steps:
      - name: Check allowed branches
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" != "main" && "$BRANCH" != hotfix/* ]]; then
            echo "❌ Production deploys are only allowed from main or hotfix/* branches."
            echo "   Current branch: $BRANCH"
            exit 1
          fi
          echo "✅ Branch $BRANCH is allowed for production."

  build-and-deploy:
    name: Build & Deploy → Production (${{ github.ref_name }})
    needs: validate-branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/trade-journal/browser --project-name=nvzn-journal --branch=${{ github.ref_name }}
