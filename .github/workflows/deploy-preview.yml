name: "Deploy: Preview"

# Deploys non-production branches to a Cloudflare Pages PREVIEW environment.
# Each branch gets a stable alias URL: <branch>.trade-journal-2go.pages.dev
# Production (the 'main' branch / trade-journal-2go.pages.dev) is never touched here
# — use the "Deploy: Production" workflow for that.

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  validate-branch:
    name: Validate branch
    runs-on: ubuntu-latest
    steps:
      - name: Reject production branch
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "❌ 'main' is the production branch. Use the 'Deploy: Production' workflow instead."
            echo "   Deploying main here would push to production, not preview."
            exit 1
          fi
          echo "✅ Branch $BRANCH will deploy to a preview environment."

  build-and-deploy:
    name: Build & Deploy → Preview (${{ github.ref_name }})
    needs: validate-branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/trade-journal/browser --project-name=nvzn-journal --branch=${{ github.ref_name }}
