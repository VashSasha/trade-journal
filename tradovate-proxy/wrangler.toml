name = "trade-journal-tradovate-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Generic CORS proxy for *.tradovateapi.com, plus the /oauth/token exchange
# endpoint that keeps the OAuth client credentials server-side.
# Deploy from this directory with:  wrangler deploy
#
# Required secrets (set once, from this directory):
#   wrangler secret put TRADOVATE_CLIENT_ID
#   wrangler secret put TRADOVATE_CLIENT_SECRET
#
# Served on a custom domain (zone nvzn-journal.com must be on this account).
# Cloudflare auto-provisions the DNS record + SSL cert for this hostname.
routes = [
  { pattern = "tv-proxy.nvzn-journal.com", custom_domain = true }
]
